name: Send Daily Exceedance Notifications

on:
  schedule:
    # Runs daily. Adjust cron for your state's timezone.
    # Default: 2 PM UTC (8 AM CST)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  send-notifications:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pandas numpy supabase

    - name: Run notification script
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python send_notifications.py

    - name: Log completion
      run: echo "Notifications processed at $(date)"
